<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Liv</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1610;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; font-family: 'Josefin Sans', sans-serif;
    overflow: hidden; touch-action: none;
  }
  #gameContainer {
    position: relative; width: 640px; height: 360px;
    overflow: hidden; border-radius: 4px;
    box-shadow: 0 0 80px rgba(160,140,100,0.12);
  }
  canvas { display: block; width: 100%; height: 100%; }
  #ui { position: absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; }
  #score {
    position: absolute; top: 18px; left: 22px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 13px; font-weight: 100; letter-spacing: 5px;
    color: rgba(255,255,255,0.38); text-transform: uppercase;
  }
  #title-screen, #game-over-screen {
    position: absolute; top:0;left:0;right:0;bottom:0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: all; cursor: pointer;
    background: rgba(14,12,10,0.42);
  }
  #title-screen h1 {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 112px; font-weight: 100;
    color: rgba(240,232,215,0.82);
    letter-spacing: 34px; text-indent: 34px;
    text-transform: uppercase;
  }
  #title-screen p {
    color: rgba(255,255,255,0.26); font-size: 9px; font-weight: 100;
    margin-top: 22px; text-align: center; line-height: 2.5;
    letter-spacing: 3px; text-transform: uppercase;
  }
  #game-over-screen { display: none; }
  #game-over-screen h2 {
    font-family: 'Josefin Sans', sans-serif; font-size: 54px; font-weight: 100;
    color: rgba(240,232,215,0.65); letter-spacing: 20px; text-transform: uppercase;
  }
  #game-over-screen .final-score {
    font-size: 11px; font-weight: 100; color: rgba(255,255,255,0.30);
    margin: 14px 0 26px; letter-spacing: 4px; text-transform: uppercase;
  }
  #game-over-screen p { color: rgba(255,255,255,0.18); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
  @media (max-width: 680px) {
    #gameContainer { width: 100vw; height: 56.25vw; border-radius: 0; }
    #title-screen h1 { font-size: 72px; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="score">0 m</div>
    <div id="title-screen">
      <h1>LIV</h1>
      <p>space / up arrow to jump  ·  hold to spin<br>mobile: tap left  ·  hold center to spin</p>
    </div>
    <div id="game-over-screen">
      <h2>bailed</h2>
      <div class="final-score" id="final-score-text">0 m</div>
      <p>press space to retry</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 360;
canvas.width = W; canvas.height = H;

const scoreEl = document.getElementById('score');
const titleEl = document.getElementById('title-screen');
const gameOverEl = document.getElementById('game-over-screen');
const finalScoreEl = document.getElementById('final-score-text');

const PALETTES = [
  { sky1: '#a8b4a2', sky2: '#c8bc88', sun: '#d8b862',
    ground: '#beb4a2', groundDark: '#9e9280', roadLine: '#b0a890',
    bldgFar: '#8a9284', bldgMid: '#727a6e', bldgNear: '#5c6458',
    tree: '#3a4c3c', treeDark: '#2a3430',
    wire: '#3c2c1a', accent: '#b08848',
    flagColors: ['#b03828','#c09040','#5890a0','#808040','#a05870'] },
  { sky1: '#9ca8b0', sky2: '#b8b0bc', sun: '#ccaa90',
    ground: '#a8a09c', groundDark: '#887e78', roadLine: '#9c9490',
    bldgFar: '#686878', bldgMid: '#585868', bldgNear: '#484858',
    tree: '#283030', treeDark: '#182020',
    wire: '#281c10', accent: '#907060',
    flagColors: ['#a03828','#b08038','#487888','#787030','#884860'] },
  { sky1: '#b4bcb0', sky2: '#c4bc9c', sun: '#d4c880',
    ground: '#acb4a8', groundDark: '#8c9488', roadLine: '#a0a898',
    bldgFar: '#687870', bldgMid: '#586860', bldgNear: '#485850',
    tree: '#2c4038', treeDark: '#1c2c28',
    wire: '#382818', accent: '#9c8050',
    flagColors: ['#a83828','#c09040','#508898','#808840','#985068'] },
];
let pal = PALETTES[0];

let state = 'title';
let score = 0, hiScore = 0;
let speed = 1.8;
let frame = 0;
let particles = [];

const GROUND_Y = H * 0.76;

const carter = {
  x: 110, y: GROUND_Y,
  vy: 0, onGround: true,
  rotation: 0, spinning: false, spinSpeed: 0,
  jumpCount: 0, maxJumps: 2
};

let obstacles = [];
let obstacleCooldown = 0;
let bgOff1 = 0, bgOff2 = 0, bgOff3 = 0, groundOff = 0, wireOff = 0;

let skyline = [];
function buildSkyline() {
  skyline = [];
  const templates = [
    {w:12,h:155},{w:22,h:88},{w:10,h:178},{w:18,h:108},
    {w:14,h:168},{w:26,h:72},{w:10,h:138},{w:16,h:122},
    {w:12,h:182},{w:20,h:95},{w:14,h:148},{w:24,h:82},
    {w:10,h:162},{w:18,h:104},{w:12,h:134},{w:22,h:86},
    {w:8,h:175},{w:16,h:98},{w:14,h:145},{w:20,h:78},
  ];
  let x = 0;
  for (let i = 0; i < templates.length * 2; i++) {
    const t = templates[i % templates.length];
    skyline.push({ x, w: t.w, h: t.h, style: i % 4 });
    x += t.w + 1 + (i % 4);
  }
}
buildSkyline();

const keys = {};
let jumpPressed = false, holdSpin = false;

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!keys[e.code]) jumpPressed = true;
    keys[e.code] = true; holdSpin = true;
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    keys[e.code] = false; holdSpin = false; carter.spinning = false;
  }
});
document.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => {
    const rx = t.clientX / document.getElementById('gameContainer').offsetWidth;
    if (rx < 0.42) jumpPressed = true;
    else if (rx <= 0.72) { holdSpin = true; }
  });
  if (state === 'title') startGame();
  if (state === 'dead') startGame();
}, { passive: false });
document.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => {
    const rx = t.clientX / document.getElementById('gameContainer').offsetWidth;
    if (rx >= 0.35 && rx <= 0.72) { holdSpin = false; carter.spinning = false; }
  });
}, { passive: false });

titleEl.addEventListener('click', () => { if (state==='title') startGame(); });
gameOverEl.addEventListener('click', () => { if (state==='dead') startGame(); });

function startGame() {
  state = 'playing'; score = 0; speed = 1.8; frame = 0;
  obstacles = []; obstacleCooldown = 100; particles = [];
  bgOff1 = bgOff2 = bgOff3 = groundOff = wireOff = 0;
  carter.y = GROUND_Y; carter.vy = 0; carter.onGround = true;
  carter.rotation = 0; carter.spinning = false; carter.jumpCount = 0;
  pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
  buildSkyline();
  titleEl.style.display = 'none';
  gameOverEl.style.display = 'none';
}

function jump() {
  if (carter.jumpCount < carter.maxJumps) {
    carter.vy = -9.5; carter.onGround = false; carter.jumpCount++;
    spawnParticles(carter.x, carter.y + 8, 4, 'rgba(180,170,150,0.55)');
  }
}

function spawnParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*2.8, vy: -(Math.random()*2+0.4), life: 1, color, size: Math.random()*2+1.5 });
  }
}

function spawnObstacle() {
  const types = ['cone','hydrant','pothole','crack','bench','trash'];
  const t = types[Math.floor(Math.random() * types.length)];
  obstacles.push({ x: W+20, type: t, w: (t==='pothole'||t==='crack') ? 46 : 22, h: t==='pothole'?14:(t==='crack'?8:30) });
}

function update() {
  if (state !== 'playing') return;
  frame++;
  score += speed * 0.032;
  speed = 1.8 + Math.floor(score / 320) * 0.22;
  speed = Math.min(speed, 4.2);

  bgOff1 = (bgOff1 + speed * 0.04) % 2200;
  bgOff2 = (bgOff2 + speed * 0.16) % 2200;
  bgOff3 = (bgOff3 + speed * 0.38) % (W + 120);
  groundOff = (groundOff + speed) % 80;
  wireOff = (wireOff + speed) % 220;

  if (jumpPressed) { jump(); jumpPressed = false; }
  if (holdSpin && !carter.onGround) { carter.spinning = true; carter.spinSpeed = 8; }
  if (carter.spinning) carter.rotation += carter.spinSpeed;

  carter.vy += 0.44;
  carter.y += carter.vy;

  if (carter.y >= GROUND_Y) {
    carter.y = GROUND_Y; carter.vy = 0; carter.onGround = true; carter.jumpCount = 0;
    if (carter.spinning) spawnParticles(carter.x, carter.y, 5, pal.accent+'99');
    carter.spinning = false; carter.rotation = 0; carter.spinSpeed = 0;
  }

  obstacleCooldown--;
  if (obstacleCooldown <= 0) {
    spawnObstacle();
    obstacleCooldown = Math.max(42, 85 + Math.random()*72 - Math.floor(score/340)*4);
  }
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -80);

  obstacles.forEach(o => {
    const isPit = o.type==='pothole' || o.type==='crack';
    if (isPit) {
      if (carter.onGround && carter.x+10>o.x && carter.x-10<o.x+o.w) die();
    } else {
      if (carter.x+10>o.x && carter.x-7<o.x+o.w && carter.y-28<GROUND_Y && carter.y>GROUND_Y-o.h-4) die();
    }
  });

  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life-=0.028; });
  particles = particles.filter(p => p.life > 0);

  scoreEl.textContent = Math.floor(score) + ' m';
  if (score > hiScore) hiScore = score;
}

function die() {
  state = 'dead';
  spawnParticles(carter.x, carter.y, 14, pal.accent);
  finalScoreEl.textContent = Math.floor(score) + ' m  ·  best ' + Math.floor(hiScore) + ' m';
  gameOverEl.style.display = 'flex';
}

// ---- DRAWING ----

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, pal.sky1);
  g.addColorStop(1, pal.sky2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);
  const sg = ctx.createRadialGradient(W*0.7, H*0.18, 0, W*0.7, H*0.18, 120);
  sg.addColorStop(0, pal.sun+'b0');
  sg.addColorStop(0.2, pal.sun+'44');
  sg.addColorStop(1, 'transparent');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(W*0.7, H*0.18, 120, 0, Math.PI*2); ctx.fill();
}

function drawSkyline() {
  const totalW = skyline[skyline.length-1].x + skyline[skyline.length-1].w + 10;

  function drawLayer(offsetFrac, color, alpha, heightScale, doTops) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    for (let rep = -1; rep <= 1; rep++) {
      skyline.forEach(b => {
        const rx = b.x - bgOff1 * offsetFrac + rep * totalW;
        if (rx > W + 80 || rx + b.w < -80) return;
        const bh = b.h * heightScale;
        ctx.fillRect(rx, GROUND_Y - bh, b.w, bh);
        if (doTops) {
          if (b.style === 0) {
            ctx.fillRect(rx+b.w*0.18, GROUND_Y-bh-14, b.w*0.64, 14);
            ctx.fillRect(rx+b.w*0.32, GROUND_Y-bh-22, b.w*0.36, 8);
            ctx.fillRect(rx+b.w*0.42, GROUND_Y-bh-28, b.w*0.16, 6);
          } else if (b.style === 1) {
            ctx.fillRect(rx+b.w*0.4, GROUND_Y-bh-24, b.w*0.2, 24);
          } else if (b.style === 2) {
            ctx.fillRect(rx-1, GROUND_Y-bh-5, b.w+2, 5);
          } else {
            ctx.beginPath();
            ctx.moveTo(rx, GROUND_Y-bh);
            ctx.lineTo(rx+b.w/2, GROUND_Y-bh-16);
            ctx.lineTo(rx+b.w, GROUND_Y-bh);
            ctx.closePath(); ctx.fill();
          }
        }
      });
    }
    ctx.globalAlpha = 1;
  }

  drawLayer(0.10, pal.bldgFar, 0.18, 1.28, false);
  drawLayer(0.25, pal.bldgMid, 0.34, 1.0, true);
  drawLayer(0.48, pal.bldgNear, 0.50, 0.64, false);

  // faint window lights
  ctx.globalAlpha = 0.07;
  ctx.fillStyle = pal.sun;
  for (let rep = -1; rep <= 1; rep++) {
    skyline.forEach(b => {
      const rx = b.x - bgOff1 * 0.25 + rep * totalW;
      if (rx > W + 80 || rx + b.w < -80) return;
      const bh = b.h;
      for (let wy = GROUND_Y-bh+12; wy < GROUND_Y-10; wy+=9) {
        for (let wx = rx+2; wx < rx+b.w-2; wx+=5) {
          ctx.fillRect(wx, wy, 1.5, 2.5);
        }
      }
    });
  }
  ctx.globalAlpha = 1;
}

function drawStreetTrees() {
  for (let i = 0; i < 5; i++) {
    const x = ((i * 250 + 120) - bgOff3) % (W + 200) - 100;
    if (x < -110 || x > W+60) continue;
    const h = 54 + (i%3)*12;
    ctx.fillStyle = pal.treeDark;
    ctx.fillRect(x-3, GROUND_Y-h*0.36, 6, h*0.36);
    ctx.fillStyle = pal.tree;
    ctx.globalAlpha = 0.80;
    ctx.beginPath(); ctx.arc(x, GROUND_Y-h*0.52, h*0.28, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.58;
    ctx.beginPath(); ctx.arc(x-h*0.16, GROUND_Y-h*0.46, h*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+h*0.16, GROUND_Y-h*0.48, h*0.16, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Draw a little sneaker shoe shape
function drawShoe(cx, cy, color, sz) {
  ctx.save();
  ctx.translate(cx, cy);
  // sole - dark strip
  ctx.fillStyle = '#28201088';
  ctx.beginPath(); ctx.roundRect(-sz, sz*0.1, sz*2, sz*0.55, sz*0.2); ctx.fill();
  // upper
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-sz*0.85, sz*0.12);
  ctx.lineTo(-sz*0.6, -sz*0.9);
  ctx.quadraticCurveTo(sz*0.05, -sz*1.1, sz*0.9, sz*0.12);
  ctx.closePath(); ctx.fill();
  // toe cap
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(sz*0.65, 0, sz*0.3, sz*0.28, 0.4, 0, Math.PI*2); ctx.fill();
  // lace
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = sz*0.16; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-sz*0.2, -sz*0.55); ctx.lineTo(sz*0.35, -sz*0.68); ctx.stroke();
  ctx.restore();
}

function drawTelephonePoles() {
  const poleSpacing = 220;
  const poleH = 118;
  const poleTopY = GROUND_Y - poleH;
  const crossY = poleTopY + 8;
  // Flag line is HIGH - right at crossarm level
  const flagLineY = crossY + 2;

  for (let i = -1; i < 5; i++) {
    const px = (i * poleSpacing) - (wireOff % poleSpacing);
    const nx = px + poleSpacing;

    // utility wires (lower, below crossarm)
    for (let w = 0; w < 3; w++) {
      const wy = crossY + 22 + w * 9;
      const sag = 18 + w * 3;
      ctx.strokeStyle = 'rgba(20,12,4,0.50)';
      ctx.lineWidth = 0.85; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(px, wy);
      ctx.quadraticCurveTo((px+nx)/2, wy+sag, nx, wy);
      ctx.stroke();
    }

    // shoe-line wire (HIGH - near top of pole)
    ctx.strokeStyle = pal.wire + 'cc';
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(px, flagLineY);
    ctx.quadraticCurveTo((px+nx)/2, flagLineY + 5, nx, flagLineY);
    ctx.stroke();

    // Shoes dangling from the line
    const numPairs = 3 + (i % 2);
    for (let s = 0; s < numPairs; s++) {
      const t = (s + 0.5) / numPairs;
      const sx = px + t * poleSpacing;
      const sagAtT = 4 * 5 * t * (1 - t);
      const wireY = flagLineY + sagAtT;
      const shoeSize = 4.5 + (s % 3) * 1.0;
      const colors = pal.flagColors;
      const c1 = colors[s % colors.length];
      const c2 = colors[(s + 2) % colors.length];

      // lace strings going up
      ctx.strokeStyle = pal.wire + '99';
      ctx.lineWidth = 0.9; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(sx - 2, wireY); ctx.lineTo(sx - 3, wireY + 9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx + 5, wireY); ctx.lineTo(sx + 6, wireY + 8); ctx.stroke();

      drawShoe(sx - 3, wireY + 9 + shoeSize, c1, shoeSize);
      drawShoe(sx + 5, wireY + 7 + shoeSize * 0.9, c2, shoeSize * 0.85);
    }

    // wooden pole - brown
    ctx.strokeStyle = pal.wire;
    ctx.lineWidth = 5; ctx.lineCap = 'square';
    ctx.beginPath(); ctx.moveTo(px, GROUND_Y+2); ctx.lineTo(px, poleTopY); ctx.stroke();
    // grain lines
    ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
    for (let g = -1; g <= 1; g++) {
      ctx.beginPath(); ctx.moveTo(px+g, poleTopY+18); ctx.lineTo(px+g, GROUND_Y); ctx.stroke();
    }

    // crossarm
    ctx.strokeStyle = pal.wire; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px-18, crossY+4); ctx.lineTo(px+18, crossY+4); ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(px-11, crossY+24); ctx.lineTo(px+11, crossY+24); ctx.stroke();

    // ceramic insulators
    ctx.fillStyle = pal.bldgMid;
    [-10,0,10].forEach(ox => { ctx.beginPath(); ctx.arc(px+ox, crossY+4, 2.2, 0, Math.PI*2); ctx.fill(); });
    [-7,7].forEach(ox => { ctx.beginPath(); ctx.arc(px+ox, crossY+24, 1.8, 0, Math.PI*2); ctx.fill(); });
  }
}

function drawGround() {
  // asphalt
  const g = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  g.addColorStop(0, pal.ground);
  g.addColorStop(1, pal.groundDark);
  ctx.fillStyle = g; ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);

  // asphalt texture dots
  ctx.globalAlpha = 0.055;
  ctx.fillStyle = '#000';
  for (let i = 0; i < 130; i++) {
    const rx = (i * 39.1 + groundOff * 1.2) % W;
    const ry = GROUND_Y + (i * 14.3) % (H - GROUND_Y);
    ctx.fillRect(rx, ry, 2, 1);
  }
  ctx.globalAlpha = 1;

  // sidewalk seam lines
  ctx.strokeStyle = pal.groundDark+'55'; ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    const sx = (i*80 - groundOff%80);
    ctx.beginPath(); ctx.moveTo(sx, GROUND_Y+1); ctx.lineTo(sx, H); ctx.stroke();
  }

  // dashed center line
  ctx.strokeStyle = pal.roadLine + '55'; ctx.lineWidth = 1.5; ctx.setLineDash([14,20]);
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y + (H-GROUND_Y)*0.44); ctx.lineTo(W, GROUND_Y + (H-GROUND_Y)*0.44); ctx.stroke();
  ctx.setLineDash([]);

  // curb
  ctx.strokeStyle = pal.groundDark; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y+2); ctx.lineTo(W, GROUND_Y+2); ctx.stroke();
}

function drawObstacle(o) {
  ctx.lineCap = 'round';
  if (o.type === 'cone') {
    ctx.fillStyle = '#a04820';
    ctx.beginPath(); ctx.moveTo(o.x+11, GROUND_Y-24); ctx.lineTo(o.x, GROUND_Y); ctx.lineTo(o.x+22, GROUND_Y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(220,210,190,0.55)'; ctx.fillRect(o.x+3, GROUND_Y-13, 14, 3);
  } else if (o.type === 'hydrant') {
    ctx.fillStyle = '#704828';
    ctx.beginPath(); ctx.roundRect(o.x+2, GROUND_Y-24, 18, 24, 3); ctx.fill();
    ctx.fillStyle = '#845838'; ctx.fillRect(o.x, GROUND_Y-18, 22, 7);
    ctx.fillStyle = '#987048';
    ctx.beginPath(); ctx.arc(o.x+11, GROUND_Y-26, 5, 0, Math.PI*2); ctx.fill();
  } else if (o.type === 'bench') {
    ctx.fillStyle = '#705830';
    ctx.fillRect(o.x, GROUND_Y-14, 38, 4);
    ctx.fillRect(o.x+4, GROUND_Y-17, 30, 12);
    ctx.fillStyle = '#503820';
    ctx.fillRect(o.x+2, GROUND_Y-4, 5, 5); ctx.fillRect(o.x+31, GROUND_Y-4, 5, 5);
  } else if (o.type === 'trash') {
    ctx.fillStyle = '#525448'; ctx.fillRect(o.x+2, GROUND_Y-26, 18, 26);
    ctx.fillStyle = '#404038'; ctx.fillRect(o.x, GROUND_Y-28, 22, 5);
  } else if (o.type === 'pothole') {
    ctx.fillStyle = '#141008';
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, GROUND_Y+3, o.w/2, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = pal.groundDark; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, GROUND_Y+2, o.w/2-1, 7, 0, 0, Math.PI); ctx.stroke();
  } else if (o.type === 'crack') {
    ctx.strokeStyle = '#141008'; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(o.x, GROUND_Y+1);
    ctx.lineTo(o.x+o.w*0.38, GROUND_Y+7);
    ctx.lineTo(o.x+o.w*0.62, GROUND_Y);
    ctx.lineTo(o.x+o.w, GROUND_Y+5);
    ctx.stroke();
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(o.x+o.w*0.3, GROUND_Y+4); ctx.lineTo(o.x+o.w*0.3+10, GROUND_Y+9); ctx.stroke();
  }
}

function drawCarter() {
  const x = carter.x, y = carter.y;
  ctx.save(); ctx.translate(x, y);
  if (carter.spinning) ctx.rotate((carter.rotation*Math.PI)/180);

  const wRot = (frame * speed * 0.10) % (Math.PI*2);

  // deck - maple wood
  ctx.fillStyle = '#b88840';
  ctx.beginPath(); ctx.roundRect(-16,-3,32,6,3); ctx.fill();
  ctx.strokeStyle = '#907020'; ctx.lineWidth = 0.7;
  ctx.strokeRect(-16,-3,32,6);
  ctx.strokeStyle = 'rgba(40,18,4,0.20)'; ctx.lineWidth = 0.7;
  for (let i=-12; i<12; i+=4) { ctx.beginPath(); ctx.moveTo(i,-3); ctx.lineTo(i+2,3); ctx.stroke(); }

  // wheels
  function whl(wx,wy) {
    ctx.save(); ctx.translate(wx,wy); ctx.rotate(wRot);
    ctx.fillStyle = '#201808';
    ctx.beginPath(); ctx.arc(0,0,4.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#907030'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-3.5,0); ctx.lineTo(3.5,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-3.5); ctx.lineTo(0,3.5); ctx.stroke();
    ctx.restore();
  }
  whl(-12,6); whl(12,6);
  ctx.strokeStyle = '#706858'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-16,3); ctx.lineTo(-12,6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16,3); ctx.lineTo(12,6); ctx.stroke();

  // legs - jeans
  const lb = carter.onGround ? Math.sin(frame*speed*0.10)*1.5 : 0;
  ctx.strokeStyle = '#506080'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-3,-4); ctx.lineTo(-4+lb,-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,-4); ctx.lineTo(4-lb,-14); ctx.stroke();

  // shoes
  ctx.fillStyle = '#d4cdc0';
  ctx.beginPath(); ctx.ellipse(-5+lb,-12,5.5,2.8,0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5-lb,-12,5.5,2.8,-0.22,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#b0a890'; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.ellipse(-5+lb,-12,5.5,2.8,0.22,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(5-lb,-12,5.5,2.8,-0.22,0,Math.PI*2); ctx.stroke();

  // hoodie
  ctx.fillStyle = '#7888a0';
  ctx.beginPath(); ctx.roundRect(-6,-29,12,15,3); ctx.fill();
  ctx.strokeStyle = 'rgba(100,120,150,0.35)'; ctx.lineWidth = 0.9;
  ctx.beginPath(); ctx.roundRect(-2.5,-21,5,5,1); ctx.stroke();

  // arms
  ctx.strokeStyle = '#7888a0'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  const ab = carter.onGround ? Math.sin(frame*speed*0.10+1)*2 : (carter.spinning ? 10 : -7);
  ctx.beginPath(); ctx.moveTo(-6,-26); ctx.lineTo(-13,-21+ab*0.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,-26); ctx.lineTo(13,-21-ab*0.28); ctx.stroke();

  // head
  ctx.fillStyle = '#e8c8a2';
  ctx.beginPath(); ctx.arc(0,-36,8.5,0,Math.PI*2); ctx.fill();

  // YELLOW HAIR - no helmet
  const y1 = '#c8a030', y2 = '#dfbe52', y3 = '#a07a20';
  // main hair mass
  ctx.fillStyle = y1;
  ctx.beginPath(); ctx.arc(0,-41,9.8,Math.PI*0.80,Math.PI*2.20); ctx.fill();
  ctx.beginPath(); ctx.arc(-9,-37,4.2,-0.5,1.6); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-37,3.8,1.5,3.6); ctx.fill();
  // fringe / bangs
  ctx.fillStyle = y2;
  ctx.beginPath(); ctx.arc(-3,-31.5,3.8,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-31.5,3.2,Math.PI,0); ctx.fill();
  // flowing strands blowing back
  ctx.strokeStyle = y3; ctx.lineWidth = 2.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8,-38); ctx.quadraticCurveTo(-16,-44,-23-speed*0.42,-40); ctx.stroke();
  ctx.strokeStyle = y1; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(-7,-35); ctx.quadraticCurveTo(-15,-39,-22-speed*0.5,-34); ctx.stroke();
  ctx.strokeStyle = y2; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-5,-41); ctx.quadraticCurveTo(-13,-47,-19-speed*0.36,-44); ctx.stroke();
  // shine highlight
  ctx.strokeStyle = y2; ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.moveTo(-1,-46); ctx.quadraticCurveTo(4,-48,7,-45); ctx.stroke();

  // face
  ctx.fillStyle = 'rgba(70,42,15,0.70)';
  ctx.beginPath(); ctx.arc(-2.8,-36,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.8,-36,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(90,52,22,0.26)';
  ctx.beginPath(); ctx.arc(0.4,-34.8,0.7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(90,52,22,0.50)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0,-33.8,2.4,0.3,Math.PI-0.3); ctx.stroke();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life * 0.72;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawSkyline();
  drawStreetTrees();
  drawTelephonePoles();
  drawGround();
  obstacles.forEach(drawObstacle);
  drawCarter();
  drawParticles();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
